                ]
            }
        ],
        relationships: [
            {from:"ENCOUNTERS", fromCol:"PATIENT_ID", to:"PATIENTS", toCol:"PATIENT_ID", label:"N:1"},
            {from:"ENCOUNTERS", fromCol:"ORGANIZATION_ID", to:"ORGANIZATIONS", toCol:"ORGANIZATION_ID", label:"N:1"},
            {from:"ENCOUNTERS", fromCol:"PROVIDER_ID", to:"PROVIDERS", toCol:"PROVIDER_ID", label:"N:1"},
            {from:"ENCOUNTERS", fromCol:"PAYER_ID", to:"PAYERS", toCol:"PAYER_ID", label:"N:1"},
            {from:"PROVIDERS", fromCol:"ORGANIZATION_ID", to:"ORGANIZATIONS", toCol:"ORGANIZATION_ID", label:"N:1"},
            {from:"CLAIMS", fromCol:"PATIENT_ID", to:"PATIENTS", toCol:"PATIENT_ID", label:"N:1"},
            {from:"CLAIMS", fromCol:"PROVIDER_ID", to:"PROVIDERS", toCol:"PROVIDER_ID", label:"N:1"},
            {from:"CLAIMS", fromCol:"ENCOUNTER_ID", to:"ENCOUNTERS", toCol:"ENCOUNTER_ID", label:"N:1"},
            {from:"CLAIMS_TX", fromCol:"CLAIM_ID", to:"CLAIMS", toCol:"CLAIM_ID", label:"N:1"},
            {from:"CLAIMS_TX", fromCol:"PATIENT_ID", to:"PATIENTS", toCol:"PATIENT_ID", label:"N:1"},
            {from:"CLAIMS_TX", fromCol:"ENCOUNTER_ID", to:"ENCOUNTERS", toCol:"ENCOUNTER_ID", label:"N:1"},
            {from:"CLAIMS_TX", fromCol:"PROVIDER_ID", to:"PROVIDERS", toCol:"PROVIDER_ID", label:"N:1"},
            {from:"CONDITIONS", fromCol:"PATIENT_ID", to:"PATIENTS", toCol:"PATIENT_ID", label:"N:1"},
            {from:"CONDITIONS", fromCol:"ENCOUNTER_ID", to:"ENCOUNTERS", toCol:"ENCOUNTER_ID", label:"N:1"},
            {from:"ALLERGIES", fromCol:"PATIENT_ID", to:"PATIENTS", toCol:"PATIENT_ID", label:"N:1"},
            {from:"ALLERGIES", fromCol:"ENCOUNTER_ID", to:"ENCOUNTERS", toCol:"ENCOUNTER_ID", label:"N:1"},
            {from:"CARE_PLANS", fromCol:"PATIENT_ID", to:"PATIENTS", toCol:"PATIENT_ID", label:"N:1"},
            {from:"CARE_PLANS", fromCol:"ENCOUNTER_ID", to:"ENCOUNTERS", toCol:"ENCOUNTER_ID", label:"N:1"},
            {from:"DEVICES", fromCol:"PATIENT_ID", to:"PATIENTS", toCol:"PATIENT_ID", label:"N:1"},
            {from:"DEVICES", fromCol:"ENCOUNTER_ID", to:"ENCOUNTERS", toCol:"ENCOUNTER_ID", label:"N:1"},
            {from:"IMAGING_STUDIES", fromCol:"PATIENT_ID", to:"PATIENTS", toCol:"PATIENT_ID", label:"N:1"},
            {from:"IMAGING_STUDIES", fromCol:"ENCOUNTER_ID", to:"ENCOUNTERS", toCol:"ENCOUNTER_ID", label:"N:1"},
            {from:"IMMUNIZATIONS", fromCol:"PATIENT_ID", to:"PATIENTS", toCol:"PATIENT_ID", label:"N:1"},
            {from:"IMMUNIZATIONS", fromCol:"ENCOUNTER_ID", to:"ENCOUNTERS", toCol:"ENCOUNTER_ID", label:"N:1"},
            {from:"MEDICATIONS", fromCol:"PATIENT_ID", to:"PATIENTS", toCol:"PATIENT_ID", label:"N:1"},
            {from:"MEDICATIONS", fromCol:"PAYER_ID", to:"PAYERS", toCol:"PAYER_ID", label:"N:1"},
            {from:"MEDICATIONS", fromCol:"ENCOUNTER_ID", to:"ENCOUNTERS", toCol:"ENCOUNTER_ID", label:"N:1"},
            {from:"OBSERVATIONS", fromCol:"PATIENT_ID", to:"PATIENTS", toCol:"PATIENT_ID", label:"N:1"},
            {from:"OBSERVATIONS", fromCol:"ENCOUNTER_ID", to:"ENCOUNTERS", toCol:"ENCOUNTER_ID", label:"N:1"},
            {from:"PROCEDURES", fromCol:"PATIENT_ID", to:"PATIENTS", toCol:"PATIENT_ID", label:"N:1"},
            {from:"PROCEDURES", fromCol:"ENCOUNTER_ID", to:"ENCOUNTERS", toCol:"ENCOUNTER_ID", label:"N:1"},
            {from:"PAYER_TRANSITIONS", fromCol:"PATIENT_ID", to:"PATIENTS", toCol:"PATIENT_ID", label:"N:1"},
            {from:"PAYER_TRANSITIONS", fromCol:"PAYER_ID", to:"PAYERS", toCol:"PAYER_ID", label:"N:1"},
            {from:"SUPPLIES", fromCol:"PATIENT_ID", to:"PATIENTS", toCol:"PATIENT_ID", label:"N:1"},
            {from:"SUPPLIES", fromCol:"ENCOUNTER_ID", to:"ENCOUNTERS", toCol:"ENCOUNTER_ID", label:"N:1"}
        ]
    };

    // Layout positions - arranged logically
    const positions = {
        "PATIENTS": {x: 600, y: 50},
        "ENCOUNTERS": {x: 600, y: 450},
        "ORGANIZATIONS": {x: 1050, y: 200},
        "PROVIDERS": {x: 1050, y: 500},
        "PAYERS": {x: 150, y: 200},
        "CLAIMS": {x: 1050, y: 800},
        "CLAIMS_TX": {x: 1400, y: 800},
        "CONDITIONS": {x: 200, y: 700},
        "ALLERGIES": {x: 200, y: 1000},
        "CARE_PLANS": {x: 450, y: 900},
        "DEVICES": {x: 700, y: 900},
        "IMAGING_STUDIES": {x: 950, y: 1100},
        "IMMUNIZATIONS": {x: 200, y: 1300},
        "MEDICATIONS": {x: 450, y: 1200},
        "OBSERVATIONS": {x: 700, y: 1200},
        "PROCEDURES": {x: 1200, y: 1100},
        "PAYER_TRANSITIONS": {x: 50, y: 500},
        "SUPPLIES": {x: 950, y: 1400}
    };

    // State
    let scale = 0.7;
    let panX = 100, panY = 50;
    let isDragging = false;
    let isPanning = false;
    let dragTarget = null;
    let dragOffsetX = 0, dragOffsetY = 0;
    let startPanX, startPanY, startMouseX, startMouseY;
    let showRelationships = true;
    let selectedTable = null;

    const canvas = document.getElementById('canvas');
    const container = document.getElementById('canvas-container');
    const svg = document.getElementById('relationships');

    function init() {
        createEntities();
        drawRelationships();
        updateTransform();
        updateMinimap();
    }

    function createEntities() {
        schema.tables.forEach(table => {
            const el = document.createElement('div');
            el.className = 'entity';
            el.id = `entity-${table.name}`;
            el.style.left = positions[table.name].x + 'px';
            el.style.top = positions[table.name].y + 'px';

            let columnsHtml = '';
            table.columns.forEach(col => {
                let iconClass = 'reg';
                let nameClass = '';
                let iconText = '&bull;';
                if (col.pk) { iconClass = 'pk'; nameClass = 'pk-name'; iconText = 'PK'; }
                else if (col.fk) { iconClass = 'fk'; nameClass = 'fk-name'; iconText = 'FK'; }
                columnsHtml += `<div class="column-row" data-col="${col.name}" data-fk="${col.fk || ''}">
                    <div class="col-icon ${iconClass}">${iconText}</div>
                    <span class="col-name ${nameClass}">${col.name}</span>
                    <span class="col-type">${col.type}</span>
                </div>`;
            });

            el.innerHTML = `
                <div class="entity-header">
                    <span>${table.name}</span>
                    <span class="row-count">${table.rows} rows</span>
                </div>
                <div class="entity-columns">${columnsHtml}</div>
            `;

            el.addEventListener('mousedown', onEntityMouseDown);
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                selectTable(table.name);
            });
            canvas.appendChild(el);
        });
    }

    function selectTable(name) {
        document.querySelectorAll('.entity').forEach(e => e.classList.remove('selected'));
        if (selectedTable === name) {
            selectedTable = null;
            highlightRelationships(null);
            return;
        }
        selectedTable = name;
        document.getElementById(`entity-${name}`).classList.add('selected');
        highlightRelationships(name);
    }

    function highlightRelationships(tableName) {
        const paths = svg.querySelectorAll('path');
        const circles = svg.querySelectorAll('circle');
        if (!tableName) {
            paths.forEach(p => p.classList.remove('highlighted'));
            circles.forEach(c => c.style.opacity = '0.5');
            return;
        }
        paths.forEach(p => {
            if (p.dataset.from === tableName || p.dataset.to === tableName) {
                p.classList.add('highlighted');
            } else {
                p.classList.remove('highlighted');
            }
        });
        circles.forEach(c => {
            if (c.dataset.table === tableName) {
                c.style.opacity = '1';
            } else {
                c.style.opacity = '0.3';
            }
        });
    }

    function getEntityCenter(name) {
        const el = document.getElementById(`entity-${name}`);
        if (!el) return {x: 0, y: 0};
        const x = parseInt(el.style.left) + el.offsetWidth / 2;
        const y = parseInt(el.style.top) + el.offsetHeight / 2;
        return {x, y};
    }

    function getEntityPort(fromName, toName) {
        const fromEl = document.getElementById(`entity-${fromName}`);
        const toEl = document.getElementById(`entity-${toName}`);
        if (!fromEl || !toEl) return {fx:0, fy:0, tx:0, ty:0};

        const fx = parseInt(fromEl.style.left);
        const fy = parseInt(fromEl.style.top);
        const fw = fromEl.offsetWidth;
        const fh = fromEl.offsetHeight;

        const tx = parseInt(toEl.style.left);
        const ty = parseInt(toEl.style.top);
        const tw = toEl.offsetWidth;
        const th = toEl.offsetHeight;

        const fcx = fx + fw/2, fcy = fy + fh/2;
        const tcx = tx + tw/2, tcy = ty + th/2;

        let fromPort = {x: fcx, y: fcy};
        let toPort = {x: tcx, y: tcy};

        // Determine best side for connection
        const dx = tcx - fcx;
        const dy = tcy - fcy;

        if (Math.abs(dx) > Math.abs(dy)) {
            if (dx > 0) {
                fromPort = {x: fx + fw, y: fcy};
                toPort = {x: tx, y: tcy};
            } else {
                fromPort = {x: fx, y: fcy};
                toPort = {x: tx + tw, y: tcy};
            }
        } else {
            if (dy > 0) {
                fromPort = {x: fcx, y: fy + fh};
                toPort = {x: tcx, y: ty};
            } else {
                fromPort = {x: fcx, y: fy};
                toPort = {x: tcx, y: ty + th};
            }
        }

        return {fx: fromPort.x, fy: fromPort.y, tx: toPort.x, ty: toPort.y};
    }

    function drawRelationships() {
        svg.innerHTML = '';
        if (!showRelationships) return;

        schema.relationships.forEach(rel => {
            const ports = getEntityPort(rel.from, rel.to);
            const {fx, fy, tx, ty} = ports;

            // Curved path
            const mx = (fx + tx) / 2;
            const my = (fy + ty) / 2;
            const dx = tx - fx;
            const dy = ty - fy;
            const cx1 = fx + dx * 0.3;
            const cy1 = fy;
            const cx2 = tx - dx * 0.3;
            const cy2 = ty;

            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', `M ${fx} ${fy} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${tx} ${ty}`);
            path.dataset.from = rel.from;
            path.dataset.to = rel.to;
            svg.appendChild(path);

            // Endpoint circles
            const c1 = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            c1.setAttribute('cx', fx); c1.setAttribute('cy', fy); c1.setAttribute('r', 3);
            c1.setAttribute('fill', '#3498db'); c1.style.opacity = '0.5'; c1.dataset.table = rel.from;
            svg.appendChild(c1);

            const c2 = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            c2.setAttribute('cx', tx); c2.setAttribute('cy', ty); c2.setAttribute('r', 5);
            c2.setAttribute('fill', '#3498db'); c2.style.opacity = '0.5'; c2.dataset.table = rel.to;
            svg.appendChild(c2);
        });
    }

    function updateTransform() {
        canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    }

    // Pan & Zoom
    container.addEventListener('mousedown', (e) => {
        if (e.target === container || e.target === canvas || e.target === svg) {
            isPanning = true;
            startPanX = panX;
            startPanY = panY;
            startMouseX = e.clientX;
            startMouseY = e.clientY;
        }
    });

    document.addEventListener('mousemove', (e) => {
        if (isPanning) {
            panX = startPanX + (e.clientX - startMouseX);
            panY = startPanY + (e.clientY - startMouseY);
            updateTransform();
            updateMinimap();
        }
        if (isDragging && dragTarget) {
            const x = (e.clientX - panX) / scale - dragOffsetX;
            const y = (e.clientY - panY) / scale - dragOffsetY;
            dragTarget.style.left = x + 'px';
            dragTarget.style.top = y + 'px';
            drawRelationships();
            if (selectedTable) highlightRelationships(selectedTable);
            updateMinimap();
        }
    });

    document.addEventListener('mouseup', () => {
        isPanning = false;
        isDragging = false;
        dragTarget = null;
    });

    container.addEventListener('wheel', (e) => {
        e.preventDefault();
        const zoomFactor = e.deltaY > 0 ? 0.92 : 1.08;
        const rect = container.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        const newScale = Math.min(Math.max(scale * zoomFactor, 0.2), 3);
        panX = mouseX - (mouseX - panX) * (newScale / scale);
        panY = mouseY - (mouseY - panY) * (newScale / scale);
        scale = newScale;
        updateTransform();
        updateMinimap();
    });

    function onEntityMouseDown(e) {
        if (e.target.closest('.entity-columns')) return;
        const entity = e.target.closest('.entity');
        if (!entity) return;
        e.stopPropagation();
        isDragging = true;
        dragTarget = entity;
        const x = (e.clientX - panX) / scale;
        const y = (e.clientY - panY) / scale;
        dragOffsetX = x - parseInt(entity.style.left);
        dragOffsetY = y - parseInt(entity.style.top);
    }

    // Controls
    function zoomIn() { scale = Math.min(scale * 1.2, 3); updateTransform(); updateMinimap(); }
    function zoomOut() { scale = Math.max(scale * 0.8, 0.2); updateTransform(); updateMinimap(); }
    function resetView() { scale = 0.7; panX = 100; panY = 50; updateTransform(); updateMinimap(); }

    function fitAll() {
        const entities = document.querySelectorAll('.entity');
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        entities.forEach(el => {
            const x = parseInt(el.style.left);
            const y = parseInt(el.style.top);
            minX = Math.min(minX, x);
            minY = Math.min(minY, y);
            maxX = Math.max(maxX, x + el.offsetWidth);
            maxY = Math.max(maxY, y + el.offsetHeight);
        });
        const contentW = maxX - minX + 100;
        const contentH = maxY - minY + 100;
        const viewW = container.clientWidth;
        const viewH = container.clientHeight;
        scale = Math.min(viewW / contentW, viewH / contentH, 1.5);
        panX = (viewW - contentW * scale) / 2 - minX * scale + 50;
        panY = (viewH - contentH * scale) / 2 - minY * scale + 50;
        updateTransform();
        updateMinimap();
    }

    function toggleRelationships() {
        showRelationships = !showRelationships;
        drawRelationships();
        if (selectedTable) highlightRelationships(selectedTable);
    }

    // Search
    document.getElementById('search').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        document.querySelectorAll('.entity').forEach(el => {
            const tableName = el.id.replace('entity-', '');
            const cols = el.querySelectorAll('.column-row');
            let match = tableName.toLowerCase().includes(query);
            cols.forEach(col => {
                if (col.dataset.col.toLowerCase().includes(query)) match = true;
            });
            el.style.opacity = query === '' || match ? '1' : '0.2';
            el.style.transform = query !== '' && match ? 'scale(1.02)' : '';
        });
    });

    // Click on background deselects
    container.addEventListener('click', (e) => {
        if (e.target === container || e.target === canvas || e.target === svg) {
            selectedTable = null;
            document.querySelectorAll('.entity').forEach(e => e.classList.remove('selected'));
            highlightRelationships(null);
        }
    });

    // Minimap
    function updateMinimap() {
        const minimap = document.getElementById('minimap');
        const entities = document.querySelectorAll('.entity');
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        entities.forEach(el => {
            const x = parseInt(el.style.left);
            const y = parseInt(el.style.top);
            minX = Math.min(minX, x);
            minY = Math.min(minY, y);
            maxX = Math.max(maxX, x + el.offsetWidth);
            maxY = Math.max(maxY, y + el.offsetHeight);
        });

        const cw = maxX - minX + 200;
        const ch = maxY - minY + 200;
        const mw = 200, mh = 140;
        const mScale = Math.min(mw / cw, mh / ch);

        let html = '';
        entities.forEach(el => {
            const x = (parseInt(el.style.left) - minX + 100) * mScale;
            const y = (parseInt(el.style.top) - minY + 100) * mScale;
            const w = Math.max(el.offsetWidth * mScale, 4);
            const h = Math.max(el.offsetHeight * mScale, 3);
            html += `<div class="minimap-entity" style="left:${x}px;top:${y}px;width:${w}px;height:${h}px;"></div>`;
        });

        // Viewport indicator
        const vx = (-panX / scale - minX + 100) * mScale;
        const vy = (-panY / scale - minY + 100) * mScale;
        const vw = (container.clientWidth / scale) * mScale;
        const vh = (container.clientHeight / scale) * mScale;
        html += `<div class="minimap-viewport" style="left:${vx}px;top:${vy}px;width:${vw}px;height:${vh}px;"></div>`;

        minimap.innerHTML = html;
    }

    // Init
    window.addEventListener('load', () => {
        init();
        setTimeout(fitAll, 100);
    });
    window.addEventListener('resize', () => { updateMinimap(); });
    </script>
</body>
